name: ci

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: Build and Test (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (for bootstrap)
        uses: dtolnay/rust-toolchain@stable

      - name: Install bootstrap compiler
        run: cargo install --git https://github.com/Pantelis23/KernRift-bootstrap kernriftc --locked

      - name: Build (bootstrap → krc → krc2)
        run: make build

      - name: Test suite
        run: |
          KRC="./build/krc2 --arch=x86_64" bash tests/run_tests.sh

      - name: Bootstrap verification (krc3 == krc4)
        run: make bootstrap

      - name: Cross-compile ARM64
        run: |
          ./build/krc2 --arch=arm64 build/krc.kr -o /tmp/krc-arm64
          file /tmp/krc-arm64 | grep -q "ARM aarch64"
          echo "ARM64 cross-compile: OK"

      - name: Fat binary verification
        run: |
          echo 'fn main() { exit(42) }' > /tmp/test.kr
          ./build/krc2 /tmp/test.kr -o /tmp/test.krbo
          python3 -c "
          d = open('/tmp/test.krbo','rb').read()
          assert d[:8] == b'KRBOFAT\x00', 'not a fat binary'
          import struct
          count = struct.unpack_from('<I', d, 12)[0]
          assert count == 2, f'expected 2 arches, got {count}'
          print(f'Fat binary OK: {count} architectures, {len(d)} bytes')
          "

  source-check:
    name: Source integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: No build artifacts tracked
        run: |
          if git ls-files -- 'build/*' 'dist/*' '*.krbo' 'a.out' | grep -q .; then
            echo "ERROR: build artifacts are tracked"
            exit 1
          fi
          echo "Clean: no artifacts tracked"

      - name: Source stats
        run: |
          echo "=== KernRift Self-Hosted Compiler ==="
          wc -l src/*.kr
          echo "---"
          echo "Total: $(cat src/*.kr | wc -l) lines"
          echo "Functions: $(grep -c '^fn ' src/*.kr)"
