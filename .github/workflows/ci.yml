name: ci

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: Build and Test (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (for bootstrap)
        uses: dtolnay/rust-toolchain@stable

      - name: Install bootstrap compiler
        run: cargo install --git https://github.com/Pantelis23/KernRift-bootstrap kernriftc --locked

      - name: Build (bootstrap → krc → krc2)
        run: make build

      - name: Test suite
        run: |
          echo '#!/bin/bash' > /tmp/krc-test
          echo 'exec ./build/krc2 --arch=x86_64 "$@"' >> /tmp/krc-test
          chmod +x /tmp/krc-test
          KRC=/tmp/krc-test bash tests/run_tests.sh

      - name: Bootstrap verification (krc3 == krc4)
        run: make bootstrap

      - name: Cross-compile ARM64
        run: |
          ./build/krc2 --arch=arm64 build/krc.kr -o /tmp/krc-arm64
          file /tmp/krc-arm64 | grep -q "ARM aarch64"
          echo "ARM64 cross-compile: OK"

      - name: Fat binary verification
        run: |
          echo 'fn main() { exit(42) }' > /tmp/test.kr
          ./build/krc2 /tmp/test.kr -o /tmp/test.krbo
          python3 -c "
          d = open('/tmp/test.krbo','rb').read()
          assert d[:8] == b'KRBOFAT\x00', 'not a fat binary'
          import struct
          count = struct.unpack_from('<I', d, 12)[0]
          assert count == 2, f'expected 2 arches, got {count}'
          print(f'Fat binary OK: {count} architectures, {len(d)} bytes')
          "

      - name: Cross-compile macOS and Windows
        run: |
          echo 'fn main() { exit(42) }' > /tmp/cross.kr
          ./build/krc2 --arch=x86_64 --emit=macho /tmp/cross.kr -o /tmp/cross-macos-x64
          file /tmp/cross-macos-x64 | grep -q "Mach-O 64-bit x86_64"
          echo "macOS x86_64 Mach-O: OK"

          ./build/krc2 --arch=arm64 --emit=macho /tmp/cross.kr -o /tmp/cross-macos-arm
          file /tmp/cross-macos-arm | grep -q "Mach-O 64-bit arm64"
          echo "macOS ARM64 Mach-O: OK"

          ./build/krc2 --arch=x86_64 --emit=pe /tmp/cross.kr -o /tmp/cross-win-x64.exe
          file /tmp/cross-win-x64.exe | grep -q "PE32+"
          echo "Windows x86_64 PE: OK"

          ./build/krc2 --arch=arm64 --emit=pe /tmp/cross.kr -o /tmp/cross-win-arm.exe
          file /tmp/cross-win-arm.exe | grep -q "PE32+"
          echo "Windows ARM64 PE: OK"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: krc-linux-x86_64
          path: build/krc2

      - name: Upload cross-compiled binaries
        uses: actions/upload-artifact@v4
        with:
          name: cross-compiled
          path: |
            /tmp/cross-macos-x64
            /tmp/cross-macos-arm
            /tmp/cross-win-x64.exe
            /tmp/cross-win-arm.exe

  test-macos-x64:
    name: Test (macOS x86_64)
    needs: build-test
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download cross-compiled binaries
        uses: actions/download-artifact@v4
        with:
          name: cross-compiled
          path: /tmp/bins

      - name: Run macOS x86_64 binary
        run: |
          chmod +x /tmp/bins/cross-macos-x64
          /tmp/bins/cross-macos-x64
          EXIT_CODE=$?
          echo "Exit code: $EXIT_CODE"
          [ "$EXIT_CODE" -eq 42 ] && echo "PASS: macOS x86_64 exit(42)" || { echo "FAIL: expected 42, got $EXIT_CODE"; exit 1; }

      - name: Download krc compiler
        uses: actions/download-artifact@v4
        with:
          name: krc-linux-x86_64
          path: /tmp/krc

      - name: Compile and run on macOS
        run: |
          # The krc binary is Linux — we need to cross-compile FROM Linux
          # Instead, test the pre-compiled macOS binaries with various programs
          echo "macOS x86_64 runtime verified with exit(42)"

  test-macos-arm:
    name: Test (macOS ARM64)
    needs: build-test
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download cross-compiled binaries
        uses: actions/download-artifact@v4
        with:
          name: cross-compiled
          path: /tmp/bins

      - name: Run macOS ARM64 binary
        run: |
          chmod +x /tmp/bins/cross-macos-arm
          # macOS ARM64 requires ad-hoc code signing
          codesign -s - /tmp/bins/cross-macos-arm 2>/dev/null || true
          /tmp/bins/cross-macos-arm
          EXIT_CODE=$?
          echo "Exit code: $EXIT_CODE"
          [ "$EXIT_CODE" -eq 42 ] && echo "PASS: macOS ARM64 exit(42)" || { echo "FAIL: expected 42, got $EXIT_CODE"; exit 1; }

  test-windows-x64:
    name: Test (Windows x86_64)
    needs: build-test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download cross-compiled binaries
        uses: actions/download-artifact@v4
        with:
          name: cross-compiled
          path: C:\tmp\bins

      - name: Run Windows x86_64 binary
        shell: pwsh
        run: |
          & C:\tmp\bins\cross-win-x64.exe
          $code = $LASTEXITCODE
          Write-Host "Exit code: $code"
          if ($code -ne 42) { Write-Host "FAIL: expected 42, got $code"; exit 1 }
          Write-Host "PASS: Windows x86_64 exit(42)"

      - name: Build and test more programs
        shell: pwsh
        run: |
          # Download krc (Linux binary, can't run on Windows)
          # Instead, use the pre-compiled Windows binaries
          Write-Host "Windows x86_64 runtime verified with exit(42)"

  test-windows-arm64:
    name: Test (Windows ARM64)
    needs: build-test
    runs-on: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download cross-compiled binaries
        uses: actions/download-artifact@v4
        with:
          name: cross-compiled
          path: C:\tmp\bins

      - name: Run Windows ARM64 binary
        shell: pwsh
        run: |
          & C:\tmp\bins\cross-win-arm.exe
          $code = $LASTEXITCODE
          Write-Host "Exit code: $code"
          if ($code -ne 42) { Write-Host "FAIL: expected 42, got $code"; exit 1 }
          Write-Host "PASS: Windows ARM64 exit(42)"

  source-check:
    name: Source integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: No build artifacts tracked
        run: |
          if git ls-files -- 'build/*' 'dist/*' '*.krbo' 'a.out' | grep -q .; then
            echo "ERROR: build artifacts are tracked"
            exit 1
          fi
          echo "Clean: no artifacts tracked"

      - name: Source stats
        run: |
          echo "=== KernRift Self-Hosted Compiler ==="
          wc -l src/*.kr
          echo "---"
          echo "Total: $(cat src/*.kr | wc -l) lines"
          echo "Functions: $(grep -c '^fn ' src/*.kr)"
