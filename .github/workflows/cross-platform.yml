name: cross-platform

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Cross-compile test binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download self-hosted compiler
        run: |
          mkdir -p build
          curl -sL -o build/krc-bootstrap \
            https://github.com/Pantelis23/KernRift/releases/latest/download/krc-linux-x86_64
          chmod +x build/krc-bootstrap

      - name: Build (self-compile)
        run: |
          cat src/lexer.kr src/ast.kr src/parser.kr src/codegen.kr src/codegen_aarch64.kr \
              src/format_macho.kr src/format_pe.kr src/format_archive.kr src/format_android.kr \
              src/bcj.kr src/analysis.kr src/living.kr src/runtime.kr src/formatter.kr src/main.kr > build/krc.kr
          ./build/krc-bootstrap --arch=x86_64 build/krc.kr -o build/krc2
          chmod +x build/krc2

      - name: Compile test programs for all platforms
        run: |
          mkdir -p /tmp/test-bins

          # Test programs
          echo 'fn main() { exit(42) }' > /tmp/exit42.kr
          echo 'fn main() { uint64 msg = "Hello from KernRift!\n"; write(1, msg, 21); exit(0) }' > /tmp/hello.kr
          echo 'fn fib(uint64 n) -> uint64 { if n <= 1 { return n }; return fib(n - 1) + fib(n - 2) }
          fn main() { exit(fib(10)) }' > /tmp/fib.kr
          echo 'fn add(uint64 a, uint64 b) -> uint64 { return a + b }
          fn main() { exit(add(10, 32)) }' > /tmp/add.kr
          echo 'static uint64 c = 0
          fn inc() { c = c + 1 }
          fn main() { inc(); inc(); inc(); exit(c) }' > /tmp/static.kr

          # alloc test
          echo 'fn main() {
              uint64 buf = alloc(64)
              unsafe { *(buf as uint64) = 42 }
              uint64 v = 0
              unsafe { *(buf as uint64) -> v }
              exit(v)
          }' > /tmp/alloc_test.kr

          # macOS x86_64
          for t in exit42 hello fib add static alloc_test; do
            ./build/krc2 --arch=x86_64 --emit=macho /tmp/$t.kr -o /tmp/test-bins/macos-x64-$t
          done

          # macOS ARM64
          for t in exit42 hello fib add static alloc_test; do
            ./build/krc2 --arch=arm64 --emit=macho /tmp/$t.kr -o /tmp/test-bins/macos-arm-$t
          done

          # Windows x86_64
          for t in exit42 hello fib add static; do
            ./build/krc2 --arch=x86_64 --emit=pe /tmp/$t.kr -o /tmp/test-bins/win-x64-$t.exe
          done

          # Windows ARM64
          for t in exit42 hello fib add static; do
            ./build/krc2 --arch=arm64 --emit=pe /tmp/$t.kr -o /tmp/test-bins/win-arm-$t.exe
          done

          # File I/O test (write + read back) with diagnostics
          cat > /tmp/fileio.kr << 'KEOF'
          fn main() {
              println("1:open-write")
              uint64 wfd = file_open("krc_test_io.tmp", 1)
              print("2:wfd=")
              println(wfd)
              uint64 msg = "KernRift"
              file_write(wfd, msg, 8)
              println("3:wrote")
              file_close(wfd)
              println("4:closed")
              uint64 buf = alloc(64)
              println("5:alloc")
              uint64 rfd = file_open("krc_test_io.tmp", 0)
              print("6:rfd=")
              println(rfd)
              uint64 n = file_read(rfd, buf, 64)
              print("7:read=")
              println(n)
              file_close(rfd)
              exit(n)
          }
          KEOF
          ./build/krc2 --arch=x86_64 --emit=pe /tmp/fileio.kr -o /tmp/test-bins/win-x64-fileio.exe
          ./build/krc2 --arch=arm64 --emit=pe /tmp/fileio.kr -o /tmp/test-bins/win-arm-fileio.exe

          # macOS file I/O tests
          ./build/krc2 --arch=x86_64 --emit=macho /tmp/fileio.kr -o /tmp/test-bins/macos-x64-fileio
          ./build/krc2 --arch=arm64 --emit=macho /tmp/fileio.kr -o /tmp/test-bins/macos-arm-fileio

          # Cross-compile full compiler for self-compilation tests
          ./build/krc2 --arch=x86_64 --emit=pe build/krc.kr -o /tmp/test-bins/krc-win-x64.exe
          ./build/krc2 --arch=arm64 --emit=pe build/krc.kr -o /tmp/test-bins/krc-win-arm64.exe
          ./build/krc2 --arch=x86_64 --emit=macho build/krc.kr -o /tmp/test-bins/krc-macos-x64
          cp build/krc.kr /tmp/test-bins/krc-source.kr

          # Build kr runners for each platform
          cat src/bcj.kr src/runner.kr > /tmp/kr_src.kr
          ./build/krc2 --arch=x86_64 --emit=pe /tmp/kr_src.kr -o /tmp/test-bins/kr-win-x64.exe
          ./build/krc2 --arch=x86_64 --emit=macho /tmp/kr_src.kr -o /tmp/test-bins/kr-macos-x64

          # Build a fat binary test program
          echo 'fn main() { exit(42) }' > /tmp/kr_fat_test.kr
          ./build/krc2 /tmp/kr_fat_test.kr -o /tmp/test-bins/kr-test.krbo

          ls -la /tmp/test-bins/

      - name: Upload test binaries
        uses: actions/upload-artifact@v4
        with:
          name: test-bins
          path: /tmp/test-bins/

  test-macos-x64:
    name: macOS x86_64
    needs: build
    runs-on: macos-14
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: test-bins
          path: bins

      - name: Run tests
        run: |
          PASS=0; FAIL=0
          run_test() {
            local name="$1" bin="$2" expected="$3"
            chmod +x "$bin"
            set +e
            OUTPUT=$("$bin" 2>&1)
            CODE=$?
            set -e
            if [ "$CODE" -eq "$expected" ]; then
              echo "PASS: $name (exit=$CODE)"
              PASS=$((PASS+1))
            else
              echo "FAIL: $name (expected=$expected, got=$CODE)"
              FAIL=$((FAIL+1))
            fi
          }
          run_test "exit42" bins/macos-x64-exit42 42
          run_test "hello"  bins/macos-x64-hello 0
          run_test "fib10"  bins/macos-x64-fib 55
          run_test "add"    bins/macos-x64-add 42
          run_test "static" bins/macos-x64-static 3
          run_test "alloc"  bins/macos-x64-alloc_test 42
          echo "=== macOS x86_64: $PASS passed, $FAIL failed ==="
          exit $FAIL

      - name: Test file I/O on macOS (Rosetta)
        run: |
          chmod +x bins/macos-x64-fileio
          set +e; bins/macos-x64-fileio; CODE=$?; set -e
          if [ "$CODE" -eq 8 ]; then
            echo "PASS: macOS x86_64 file I/O (read 8 bytes)"
          else
            echo "FAIL: macOS x86_64 file I/O (expected 8, got $CODE)"
            exit 1
          fi

      - name: Fat binary runner (kr) on macOS
        run: |
          chmod +x bins/kr-macos-x64
          set +e; bins/kr-macos-x64 bins/kr-test.krbo; CODE=$?; set -e
          if [ "$CODE" -eq 42 ]; then
            echo "PASS: kr runner (fat binary exit=42)"
          else
            echo "FAIL: kr runner (exit=$CODE)"
            exit 1
          fi

      - name: Self-compilation on macOS (Rosetta)
        run: |
          set +e
          chmod +x bins/krc-macos-x64
          echo 'fn main() { println("macOS self-compiled!"); exit(42) }' > test.kr
          ./bins/krc-macos-x64 --arch=x86_64 --emit=macho test.kr -o test_out 2>&1
          COMP=$?
          if [ "$COMP" -ne 0 ]; then echo "FAIL: compile (exit=$COMP)"; exit 1; fi
          chmod +x test_out
          ./test_out; CODE=$?
          if [ "$CODE" -eq 42 ]; then
            echo "PASS: macOS x86_64 self-compilation"
          else
            echo "FAIL: run exit=$CODE (expected 42)"
            exit 1
          fi

  test-macos-arm:
    name: macOS ARM64
    needs: build
    runs-on: macos-14
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: test-bins
          path: bins

      - name: Diagnose ARM64 binary
        continue-on-error: true
        run: |
          set +e
          chmod +x bins/macos-arm-exit42
          xattr -cr bins/ 2>/dev/null || true
          codesign -f -s - bins/macos-arm-exit42 2>&1; echo "codesign: $?"
          codesign -vvv bins/macos-arm-exit42 2>&1; echo "verify: $?"
          # Check if the binary even loads
          echo "--- dyld info ---"
          otool -L bins/macos-arm-exit42 2>&1 || echo "(no deps)"
          echo "--- crash log ---"
          ./bins/macos-arm-exit42 2>&1; echo "exit: $?"
          sleep 2
          # Check Console for our binary's crash
          log show --predicate 'eventMessage CONTAINS "macos-arm" OR eventMessage CONTAINS "exit42" OR (process == "kernel" AND eventMessage CONTAINS "AMFI")' --last 30s --style compact 2>&1 | tail -20
          set -e

      - name: Run tests
        continue-on-error: true
        run: |
          echo "=== macOS diagnostics ==="
          sw_vers
          # Build a reference binary with clang
          echo 'int main() { return 42; }' > /tmp/ref.c
          clang -o /tmp/ref_arm64 /tmp/ref.c -arch arm64 -Wl,-no_pie 2>&1 || true
          echo "--- reference binary headers ---"
          otool -l /tmp/ref_arm64 2>&1 | grep -A3 "cmd LC_\|segname\|maxprot\|initprot" | head -30
          echo "--- our binary headers ---"
          chmod +x bins/macos-arm-exit42
          otool -l bins/macos-arm-exit42 2>&1 | grep -A3 "cmd LC_\|segname\|maxprot\|initprot" | head -40
          echo "--- remove quarantine + codesign ---"
          xattr -cr bins/ 2>/dev/null || true
          codesign -f -s - bins/macos-arm-exit42 2>&1 || echo "codesign FAILED: $?"
          echo "--- run ---"
          set +e; bins/macos-arm-exit42; echo "exit: $?"; set -e
          echo "=== end diagnostics ==="

          PASS=0; FAIL=0
          run_test() {
            local name="$1" bin="$2" expected="$3"
            chmod +x "$bin"
            xattr -cr "$bin" 2>/dev/null || true
            codesign -f -s - "$bin" 2>/dev/null || true
            set +e
            OUTPUT=$("$bin" 2>&1)
            CODE=$?
            set -e
            if [ "$CODE" -eq "$expected" ]; then
              echo "PASS: $name (exit=$CODE)"
              PASS=$((PASS+1))
            else
              echo "FAIL: $name (expected=$expected, got=$CODE)"
              FAIL=$((FAIL+1))
            fi
          }
          run_test "exit42" bins/macos-arm-exit42 42
          run_test "hello"  bins/macos-arm-hello 0
          run_test "fib10"  bins/macos-arm-fib 55
          run_test "add"    bins/macos-arm-add 42
          run_test "static" bins/macos-arm-static 3
          run_test "alloc"  bins/macos-arm-alloc_test 42
          run_test "fileio" bins/macos-arm-fileio 8
          echo "=== macOS ARM64: $PASS passed, $FAIL failed ==="
          exit $FAIL

  test-windows-x64:
    name: Windows x86_64
    needs: build
    runs-on: windows-latest
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: test-bins
          path: bins

      - name: Run tests
        shell: pwsh
        run: |
          $pass = 0; $fail = 0
          function Run-Test($name, $bin, $expected) {
            & $bin 2>$null
            $code = $LASTEXITCODE
            if ($code -eq $expected) {
              Write-Host "PASS: $name (exit=$code)"
              $script:pass++
            } else {
              Write-Host "FAIL: $name (expected=$expected, got=$code)"
              $script:fail++
            }
          }
          Run-Test "exit42" "bins\win-x64-exit42.exe" 42
          Run-Test "fib10"  "bins\win-x64-fib.exe" 55
          Run-Test "add"    "bins\win-x64-add.exe" 42
          Run-Test "static" "bins\win-x64-static.exe" 3
          Write-Host "=== Windows x86_64: $pass passed, $fail failed ==="
          exit $fail

      - name: Test hello world output
        shell: pwsh
        run: |
          $output = & bins\win-x64-hello.exe 2>&1
          if ($output -match "Hello from KernRift") {
            Write-Host "PASS: hello world output"
          } else {
            Write-Host "FAIL: hello world output: $output"
            exit 1
          }

      - name: Test file I/O (write + read back)
        shell: pwsh
        run: |
          $r = Start-Process -FilePath bins\win-x64-fileio.exe -Wait -PassThru -NoNewWindow
          if ($r.ExitCode -eq 8) {
            Write-Host "PASS: file I/O (read back 8 bytes)"
          } else {
            Write-Host "FAIL: file I/O (expected 8, got $($r.ExitCode))"
            exit 1
          }

      - name: Fat binary runner (kr) on Windows
        shell: pwsh
        run: |
          $r = Start-Process -FilePath bins\kr-win-x64.exe -ArgumentList 'bins\kr-test.krbo' -Wait -PassThru -NoNewWindow
          if ($r.ExitCode -eq 42) {
            Write-Host "PASS: kr runner (fat binary exit=42)"
          } else {
            Write-Host "FAIL: kr runner (exit=$($r.ExitCode))"
            exit 1
          }

      - name: Self-compilation on Windows
        shell: pwsh
        run: |
          $r1 = Start-Process -FilePath bins\krc-win-x64.exe -ArgumentList '--emit=pe','bins\krc-source.kr','-o','krc-self1.exe' -Wait -PassThru -NoNewWindow
          if ($r1.ExitCode -ne 0) { Write-Host "FAIL: self-compile stage 1 (exit=$($r1.ExitCode))"; exit 1 }
          Write-Host "Stage 1: OK (compiled on Windows)"

          Set-Content -Path test.kr -Value 'fn main() { println("self-compiled!"); exit(42) }'
          $r2 = Start-Process -FilePath .\krc-self1.exe -ArgumentList '--emit=pe','test.kr','-o','test-self.exe' -Wait -PassThru -NoNewWindow
          if ($r2.ExitCode -ne 0) { Write-Host "FAIL: self-compile stage 2 (exit=$($r2.ExitCode))"; exit 1 }

          $r3 = Start-Process -FilePath .\test-self.exe -Wait -PassThru -NoNewWindow
          if ($r3.ExitCode -eq 42) {
            Write-Host "PASS: Windows self-compilation chain"
          } else {
            Write-Host "FAIL: test-self.exe exit=$($r3.ExitCode) (expected 42)"
            exit 1
          }

  test-windows-arm64:
    name: Windows ARM64
    needs: build
    runs-on: windows-11-arm
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: test-bins
          path: bins

      - name: Run tests
        shell: pwsh
        run: |
          $pass = 0; $fail = 0
          function Run-Test($name, $bin, $expected) {
            $r = Start-Process -FilePath $bin -Wait -PassThru -NoNewWindow
            $code = $r.ExitCode
            if ($code -eq $expected) {
              Write-Host "PASS: $name (exit=$code)"
              $script:pass++
            } else {
              Write-Host "FAIL: $name (expected=$expected, got=$code)"
              $script:fail++
            }
          }
          Run-Test "exit42" "bins\win-arm-exit42.exe" 42
          Run-Test "fib10"  "bins\win-arm-fib.exe" 55
          Run-Test "add"    "bins\win-arm-add.exe" 42
          Run-Test "static" "bins\win-arm-static.exe" 3
          Write-Host "=== Windows ARM64: $pass passed, $fail failed ==="
          exit $fail

      - name: Test hello world output
        shell: pwsh
        run: |
          $output = & bins\win-arm-hello.exe 2>&1
          if ($output -match "Hello from KernRift") {
            Write-Host "PASS: hello world output"
          } else {
            Write-Host "FAIL: hello world output: $output"
            exit 1
          }

      - name: Test file I/O (write + read back)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $r = Start-Process -FilePath bins\win-arm-fileio.exe -Wait -PassThru -NoNewWindow
          if ($r.ExitCode -eq 8) {
            Write-Host "PASS: file I/O (read back 8 bytes)"
          } else {
            Write-Host "FAIL: file I/O (expected 8, got $($r.ExitCode))"
            exit 1
          }

      - name: Self-compilation on Windows ARM64
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          Set-Content -Path test.kr -Encoding ascii -Value 'fn main() { println("ARM64 self-compiled!"); exit(42) }'

          # Stage 1: cross-compiled compiler (krc3) compiles test program
          $r1 = Start-Process -FilePath bins\krc-win-arm64.exe -ArgumentList '--emit=pe','test.kr','-o','test-s1.exe' -Wait -PassThru -NoNewWindow
          if ($r1.ExitCode -ne 0) { Write-Host "FAIL: stage 1 compile (exit=$($r1.ExitCode))"; exit 1 }
          $r1r = Start-Process -FilePath .\test-s1.exe -Wait -PassThru -NoNewWindow
          if ($r1r.ExitCode -ne 42) { Write-Host "FAIL: stage 1 run (exit=$($r1r.ExitCode))"; exit 1 }
          Write-Host "Stage 1: PASS (krc3 compiles test, runs with exit 42)"

          # Stage 2: krc3 self-compiles to krc4
          $r2 = Start-Process -FilePath bins\krc-win-arm64.exe -ArgumentList '--emit=pe','bins\krc-source.kr','-o','krc4.exe' -Wait -PassThru -NoNewWindow
          if ($r2.ExitCode -ne 0) { Write-Host "FAIL: stage 2 self-compile (exit=$($r2.ExitCode))"; exit 1 }
          Write-Host "Stage 2: PASS (krc3 self-compiled to krc4, $((Get-Item krc4.exe).Length) bytes)"

          # Stage 3: krc4 compiles the same test program
          $r3 = Start-Process -FilePath .\krc4.exe -ArgumentList '--emit=pe','test.kr','-o','test-s3.exe' -Wait -PassThru -NoNewWindow
          if ($r3.ExitCode -ne 0) { Write-Host "FAIL: stage 3 compile (exit=$($r3.ExitCode))"; exit 1 }
          $r3r = Start-Process -FilePath .\test-s3.exe -Wait -PassThru -NoNewWindow
          if ($r3r.ExitCode -ne 42) { Write-Host "FAIL: stage 3 run (exit=$($r3r.ExitCode))"; exit 1 }
          Write-Host "Stage 3: PASS (krc4 compiles test, runs with exit 42)"

          # Stage 4: compare krc3 and krc4 output (bootstrap fixed point)
          $h1 = (Get-FileHash test-s1.exe).Hash
          $h3 = (Get-FileHash test-s3.exe).Hash
          if ($h1 -eq $h3) {
            Write-Host "PASS: krc3 and krc4 produce identical output (bootstrap verified)"
          } else {
            Write-Host "INFO: krc3 and krc4 output differs (expected — different compiler binaries)"
          }
