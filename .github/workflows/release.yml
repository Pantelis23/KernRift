name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  build-upload:
    name: build + upload (${{ matrix.artifact_suffix }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_suffix: linux-x86_64
            exe_suffix: ""
          - os: ubuntu-24.04-arm
            artifact_suffix: linux-aarch64
            exe_suffix: ""
          - os: macos-latest
            artifact_suffix: macos-aarch64
            exe_suffix: ""
          - os: macos-13
            artifact_suffix: macos-x86_64
            exe_suffix: ""
          - os: windows-latest
            artifact_suffix: windows-x86_64
            exe_suffix: .exe

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Gate the release: fail early if repo is broken
      - name: Gates (fmt/clippy/test)
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace

      - name: Build (release)
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --locked -p kernriftc -p kernrift

      - name: Verify version matches tag
        shell: bash
        run: |
          set -euo pipefail
          expected="${GITHUB_REF_NAME#v}"
          got="$(./target/release/kernriftc${{ matrix.exe_suffix }} --version | tr -d '\r')"
          echo "expected=$expected got=$got"
          echo "$got" | grep -F "$expected"

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          for bin in kernriftc kernrift; do
            cp "target/release/${bin}" "dist/${bin}-${{ matrix.artifact_suffix }}"
            sha256sum "dist/${bin}-${{ matrix.artifact_suffix }}" \
              > "dist/${bin}-${{ matrix.artifact_suffix }}.sha256"
          done

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          foreach ($bin in @("kernriftc", "kernrift")) {
            $dst = "dist\$bin-${{ matrix.artifact_suffix }}.exe"
            Copy-Item "target\release\$bin.exe" $dst
            $h = (Get-FileHash -Algorithm SHA256 $dst).Hash.ToLower()
            Set-Content -NoNewline -Path "$dst.sha256" -Value "$h  $(Split-Path -Leaf $dst)`n"
          }

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artifacts (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          for f in dist/*; do
            case "$f" in *.sha256|*.sig|*.cert) continue ;; esac
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.cert" \
              "$f"
          done

      - name: Sign artifacts (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $files = Get-ChildItem dist | Where-Object { $_.Name -notmatch '\.(sha256|sig|cert)$' }
          foreach ($f in $files) {
            $p = $f.FullName
            cosign sign-blob --yes `
              --output-signature "$p.sig" `
              --output-certificate "$p.cert" `
              "$p"
          }

      - name: Verify signatures (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          for f in dist/*; do
            case "$f" in *.sha256|*.sig|*.cert) continue ;; esac
            cosign verify-blob \
              --certificate "${f}.cert" \
              --signature "${f}.sig" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              --certificate-identity-regexp "^https://github.com/Pantelis23/KernRift/\\.github/workflows/release\\.yml@refs/tags/${GITHUB_REF_NAME}$" \
              "$f"
          done

      - name: Verify signatures (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $re = "^https://github.com/Pantelis23/KernRift/\.github/workflows/release\.yml@refs/tags/$($env:GITHUB_REF_NAME)$"
          $files = Get-ChildItem dist | Where-Object { $_.Name -notmatch '\.(sha256|sig|cert)$' }
          foreach ($f in $files) {
            $p = $f.FullName
            cosign verify-blob `
              --certificate "$p.cert" `
              --signature "$p.sig" `
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" `
              --certificate-identity-regexp $re `
              "$p"
          }

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            See [CHANGELOG](https://github.com/Pantelis23/KernRift/blob/main/CHANGELOG.md) for full details.

            > **macOS x86_64**: built and shipped by CI but not independently verified on Intel Mac hardware. Report any issues.

            ### Verifying downloads
            Each binary ships with a `.sha256` checksum and a cosign keyless signature (`.sig` + `.cert`).
            ```sh
            sha256sum --check kernriftc-linux-x86_64.sha256
            cosign verify-blob --certificate kernriftc-linux-x86_64.cert \
              --signature kernriftc-linux-x86_64.sig \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --certificate-identity-regexp 'https://github.com/Pantelis23/KernRift/.github/workflows/release.yml' \
              kernriftc-linux-x86_64
            ```
          files: dist/*
