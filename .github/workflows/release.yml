name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build release binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap build/krc2 (with retry for nondeterministic releases)
        run: |
          mkdir -p build
          curl -sL -o build/krc-bootstrap \
            https://github.com/Pantelis23/KernRift/releases/latest/download/krc-linux-x86_64
          chmod +x build/krc-bootstrap
          cat src/lexer.kr src/ast.kr src/parser.kr src/codegen.kr \
              src/codegen_aarch64.kr src/format_macho.kr src/format_pe.kr \
              src/format_archive.kr src/format_android.kr src/bcj.kr \
              src/analysis.kr src/living.kr src/runtime.kr src/formatter.kr src/main.kr > build/krc.kr
          # Retry until we get a valid ELF that can compile a probe.
          # Pre-2.6.2 releases non-deterministically corrupt output on
          # larger sources (fixup_table overflow).
          attempt=0
          max=40
          while [ $attempt -lt $max ]; do
            attempt=$((attempt+1))
            rm -f build/krc2 build/krc2.probe
            if timeout 60 ./build/krc-bootstrap --arch=x86_64 build/krc.kr -o build/krc2 2>/dev/null; then
              if [ -s build/krc2 ]; then
                chmod +x build/krc2
                if file build/krc2 | grep -q 'ELF 64-bit'; then
                  echo 'fn main(){exit(0)}' > /tmp/probe.kr
                  if timeout 10 ./build/krc2 --arch=x86_64 /tmp/probe.kr -o build/krc2.probe 2>/dev/null; then
                    chmod +x build/krc2.probe 2>/dev/null
                    if [ -s build/krc2.probe ] && ./build/krc2.probe; then
                      echo "bootstrap OK on attempt $attempt"
                      break
                    fi
                  fi
                fi
              fi
            fi
            echo "attempt $attempt: broken, retrying..."
          done
          [ -x build/krc2 ] || { echo "bootstrap failed after $max attempts"; exit 1; }
          rm -f build/krc2.probe /tmp/probe.kr
          # Re-bootstrap once with the fresh compiler (fixup_table bumped)
          ./build/krc2 --arch=x86_64 build/krc.kr -o build/krc2.stable
          mv build/krc2.stable build/krc2
          chmod +x build/krc2

      - name: Create distribution
        run: make dist

      - name: Build all platform binaries
        run: |
          # krc for Windows
          ./build/krc2 --arch=x86_64 --emit=pe build/krc.kr -o dist/krc-windows-x86_64.exe
          ./build/krc2 --arch=arm64  --emit=pe build/krc.kr -o dist/krc-windows-arm64.exe
          # krc for macOS
          ./build/krc2 --arch=x86_64 --emit=macho build/krc.kr -o dist/krc-macos-x86_64
          ./build/krc2 --arch=arm64  --emit=macho build/krc.kr -o dist/krc-macos-arm64
          # krc for Android
          ./build/krc2 --emit=android build/krc.kr -o dist/krc-android-arm64
          ./build/krc2 --arch=x86_64 --emit=android build/krc.kr -o dist/krc-android-x86_64
          # kr runner (merge bcj.kr + runner.kr)
          cat src/bcj.kr src/runner.kr > build/kr.kr
          ./build/krc2 --arch=x86_64 build/kr.kr -o dist/kr-linux-x86_64
          ./build/krc2 --arch=arm64  build/kr.kr -o dist/kr-linux-arm64
          chmod +x dist/kr-linux-x86_64 dist/kr-linux-arm64
          # kr runner (Windows)
          ./build/krc2 --arch=x86_64 --emit=pe build/kr.kr -o dist/kr-windows-x86_64.exe
          ./build/krc2 --arch=arm64  --emit=pe build/kr.kr -o dist/kr-windows-arm64.exe
          # kr runner (macOS)
          ./build/krc2 --arch=x86_64 --emit=macho build/kr.kr -o dist/kr-macos-x86_64
          ./build/krc2 --arch=arm64  --emit=macho build/kr.kr -o dist/kr-macos-arm64
          # kr runner (Android)
          ./build/krc2 --emit=android build/kr.kr -o dist/kr-android-arm64
          ./build/krc2 --arch=x86_64 --emit=android build/kr.kr -o dist/kr-android-x86_64

      - name: Verify binaries
        run: |
          echo "=== Distribution ==="
          ls -la dist/

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum krc-linux-x86_64 krc-linux-arm64 \
                    krc-windows-x86_64.exe krc-windows-arm64.exe \
                    krc-macos-x86_64 krc-macos-arm64 \
                    krc-android-arm64 krc-android-x86_64 \
                    kr-linux-x86_64 kr-linux-arm64 \
                    kr-windows-x86_64.exe kr-windows-arm64.exe \
                    kr-macos-x86_64 kr-macos-arm64 \
                    kr-android-arm64 kr-android-x86_64 \
                    krc.krbo krc-source.kr > SHA256SUMS

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/krc-linux-x86_64
            dist/krc-linux-arm64
            dist/krc-windows-x86_64.exe
            dist/krc-windows-arm64.exe
            dist/krc-macos-x86_64
            dist/krc-macos-arm64
            dist/krc-android-arm64
            dist/krc-android-x86_64
            dist/kr-linux-x86_64
            dist/kr-linux-arm64
            dist/kr-windows-x86_64.exe
            dist/kr-windows-arm64.exe
            dist/kr-macos-x86_64
            dist/kr-macos-arm64
            dist/kr-android-arm64
            dist/kr-android-x86_64
            dist/krc.krbo
            dist/krc-source.kr
            dist/SHA256SUMS
          generate_release_notes: true

  winget-release:
    name: Submit winget manifest
    needs: build-release
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Submit to winget-pkgs
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: Pantelis23.KernRift
          version: ${{ github.ref_name }}
          release-tag: ${{ github.ref_name }}
          installers-regex: 'krc-windows-(x86_64|arm64)\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
