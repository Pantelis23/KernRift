name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build release binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (for bootstrap)
        uses: dtolnay/rust-toolchain@stable

      - name: Install bootstrap compiler
        run: cargo install --git https://github.com/Pantelis23/KernRift-bootstrap kernriftc --locked

      - name: Build and create distribution
        run: |
          make build
          make dist

      - name: Verify binaries
        run: |
          echo "=== Distribution ==="
          ls -la dist/
          file dist/krc-linux-x86_64
          file dist/krc-linux-arm64

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/krc-linux-x86_64
            dist/krc-linux-arm64
            dist/krc.krbo
            dist/krc-source.kr
          generate_release_notes: true
