<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" fill="#0d1117"/>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- K left stroke -->
    <line x1="9" y1="6" x2="9" y2="26" stroke="#4a90d9" stroke-width="3"/>
    <!-- K upper arm -->
    <line x1="9" y1="16" x2="21" y2="6" stroke="#4a90d9" stroke-width="2.5"/>
    <!-- K lower arm -->
    <line x1="9" y1="16" x2="21" y2="26" stroke="#4a90d9" stroke-width="2.5"/>
    <!-- Lightning crack through the K -->
    <polyline points="15,6 13,11 17,13 12,19 16,21 14,26" stroke="#7ec8e3" stroke-width="1.2" opacity="0.9"/>
  </g>
</svg>
